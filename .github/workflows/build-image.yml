name: Build Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: homelab-alert-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and bump VERSION
        id: version
        run: |
          set -euo pipefail
          vf=VERSION
          if [ ! -f "$vf" ]; then
            echo "1.0.0" > "$vf"
          fi
          ver=$(tr -d '[:space:]' < "$vf")
          version_changed=false
          if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "$vf" | grep -q .; then
              version_changed=true
            fi
          fi
          if [ "$version_changed" = false ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              other=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -vE '^VERSION$' || true)
              if [ -z "$other" ]; then
                echo "VERSION-only commit; skipping rebuild" >> "$GITHUB_STEP_SUMMARY"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                echo "version=$ver" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            IFS=. read -r ma mi pa <<< "$ver"
            ver="${ma}.${mi}.$((pa + 1))"
            echo "$ver" > "$vf"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Publishing ${{ env.IMAGE_NAME }}:$ver"

      - uses: docker/setup-buildx-action@v4
        if: steps.version.outputs.skip != 'true'

      - uses: docker/login-action@v4
        if: steps.version.outputs.skip != 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: steps.version.outputs.skip != 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: steps.version.outputs.skip != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Commit VERSION file
        if: steps.version.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore: bump VERSION to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Summary
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "Published ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Renovate in nerddotdad/truecharts will bump cluster pins." >> "$GITHUB_STEP_SUMMARY"
